# nginx/nginx.prod.conf
# ConstructERP — Production Nginx for app.bcim.in
# Handles: HTTPS, SPA routing, API proxy, Socket.IO WebSocket, SSL auto-renew

events {
  worker_connections 2048;
  multi_accept       on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Upstreams ─────────────────────────────────────────────────────────────
  upstream api       { server backend:5000;  keepalive 32; }
  upstream app       { server frontend:80;   keepalive 16; }

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr [$time_local] "$request" $status '
                  '$body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log  warn;

  # ── Performance ───────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  server_tokens      off;

  # ── Gzip ──────────────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   1024;
  gzip_types        text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript image/svg+xml
                    application/vnd.ms-fontobject application/x-font-ttf font/opentype;

  # ── Rate limiting ─────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=auth:10m  rate=5r/m;
  limit_req_zone $binary_remote_addr zone=api:10m   rate=120r/m;
  limit_req_zone $binary_remote_addr zone=global:10m rate=300r/m;
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  # ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────
  server {
    listen      80;
    listen      [::]:80;
    server_name app.bcim.in bcim.in www.bcim.in;

    # Let's Encrypt ACME challenge (must be HTTP)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
      return 301 https://app.bcim.in$request_uri;
    }
  }

  # ── HTTPS Main Server ─────────────────────────────────────────────────────
  server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name app.bcim.in;

    # ── SSL (Let's Encrypt) ────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/app.bcim.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.bcim.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Upload size ────────────────────────────────────────────────────────
    client_max_body_size 50M;

    # ── Health probe ───────────────────────────────────────────────────────
    location /health {
      proxy_pass http://api;
      proxy_set_header Host $host;
      access_log off;
    }

    # ── Socket.IO (WebSocket upgrade) ─────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400s;    # keep WebSocket alive
      proxy_send_timeout 86400s;
      proxy_buffering    off;
    }

    # ── Auth endpoints — strict rate limit ────────────────────────────────
    location /api/v1/auth/ {
      limit_req        zone=auth burst=10 nodelay;
      limit_req_status 429;

      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── API → Node backend ────────────────────────────────────────────────
    location /api/ {
      limit_req        zone=api burst=60 nodelay;
      limit_req_status 429;
      limit_conn       addr 50;

      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 120s;
      proxy_connect_timeout 10s;
      proxy_buffering    on;
      proxy_buffer_size  16k;
      proxy_buffers      8 16k;
    }

    # ── Authenticated file uploads ────────────────────────────────────────
    location /uploads/ {
      alias      /var/www/uploads/;
      expires    7d;
      add_header Cache-Control "private, must-revalidate";
    }

    # ── React SPA (everything else) ───────────────────────────────────────
    location / {
      proxy_pass         http://app;
      proxy_http_version 1.1;
      proxy_set_header   Host      $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 30s;
    }
  }

  # ── Redirect bcim.in + www → app.bcim.in ─────────────────────────────────
  server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name bcim.in www.bcim.in;

    ssl_certificate     /etc/letsencrypt/live/app.bcim.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.bcim.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    return 301 https://app.bcim.in$request_uri;
  }
}
