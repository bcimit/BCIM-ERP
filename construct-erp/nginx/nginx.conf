events {
  worker_connections 1024;
}

http {
  # ── Upstreams ────────────────────────────────────────────
  upstream backend  { server backend:5000; }
  upstream frontend { server frontend:80;  }

  # ── Logging ──────────────────────────────────────────────
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
  access_log  /var/log/nginx/access.log  main;
  error_log   /var/log/nginx/error.log   warn;

  # ── Gzip ─────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_types        text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml application/vnd.ms-fontobject application/x-font-ttf
                    font/opentype;

  # ── Rate limiting zones ───────────────────────────────────
  # Auth endpoints — tighter (30 req / 15 min per IP)
  limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/m;
  # API endpoints — moderate (100 req / min per IP)
  limit_req_zone $binary_remote_addr zone=api:10m  rate=100r/m;

  # ── HTTPS redirect ────────────────────────────────────────
  server {
    listen      80;
    server_name _;

    # Allow nginx healthcheck probe without redirect
    location /nginx-health {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # Redirect all other HTTP → HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS server ──────────────────────────────────────────
  server {
    listen      443 ssl http2;
    server_name _;

    # SSL — mount your cert/key at ./nginx/ssl/
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Max upload size (for document attachments)
    client_max_body_size 50M;

    # ── Security headers ────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-Frame-Options          "DENY"             always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';"
      always;

    # ── Health probe (Docker healthcheck can hit this) ──────
    location /nginx-health {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ── Auth endpoints — strict rate limit ──────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      limit_req_status 429;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── API → Node backend ──────────────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      limit_req_status 429;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade     $http_upgrade;
      proxy_set_header   Connection  'upgrade';
      proxy_set_header   Host        $host;
      proxy_set_header   X-Real-IP   $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 120s;
    }

    # ── Static uploads served directly ──────────────────────
    location /uploads/ {
      alias       /var/www/uploads/;
      expires     30d;
      add_header  Cache-Control "public, no-transform";
      # Prevent hotlinking from unknown origins
      valid_referers none blocked server_names ~\.yourcompany\.;
    }

    # ── React SPA ────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host        $host;
      proxy_set_header   X-Real-IP   $remote_addr;
    }
  }
}
