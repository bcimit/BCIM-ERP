# .github/workflows/deploy.yml
# Auto-deploy to Hetzner VPS on push to main branch
#
# GitHub Secrets required (Settings → Secrets → Actions):
#   HETZNER_HOST     — your server IP (e.g. 65.21.xxx.xxx)
#   HETZNER_USER     — ssh user (root or deploy)
#   HETZNER_SSH_KEY  — private SSH key (contents of ~/.ssh/id_rsa)
#   DB_PASSWORD      — production database password
#   JWT_SECRET       — production JWT secret (64+ chars)

name: Deploy to Hetzner

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to app.bcim.in
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Deploy via SSH ──────────────────────────────────────────────────
      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.HETZNER_HOST }}
          username:    ${{ secrets.HETZNER_USER }}
          key:         ${{ secrets.HETZNER_SSH_KEY }}
          timeout:     15m
          script: |
            set -e
            cd /opt/constructerp

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Updating .env.production secrets ──"
            sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.DB_PASSWORD }}|" .env.production
            sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" .env.production

            echo "── Running deploy script ──"
            bash scripts/deploy.sh

      # ── 3. Notify (optional — add Slack/email webhook here) ───────────────
      - name: Deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployed successfully to https://app.bcim.in"
          else
            echo "❌ Deployment failed — check logs"
          fi
