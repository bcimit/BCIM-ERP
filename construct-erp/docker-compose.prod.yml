# docker-compose.prod.yml
# ConstructERP — Hetzner VPS Production Deployment
# Domain : app.bcim.in
# Usage  : docker-compose -f docker-compose.prod.yml up -d
#
# Required .env vars (see .env.production.example):
#   DB_PASSWORD, JWT_SECRET, DOMAIN

version: '3.9'

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       construct_erp
      POSTGRES_USER:     erp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      - erp_net
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U erp_user -d construct_erp"]
      interval: 10s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── DB Migration ───────────────────────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_migrate
    command: node src/config/migrate.js
    env_file: .env.production
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     construct_erp
      DB_USER:     erp_user
      DB_PASSWORD: ${DB_PASSWORD}
      NODE_ENV:    production
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - erp_net

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: erp_api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV:      production
      PORT:          5000
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       construct_erp
      DB_USER:       erp_user
      DB_PASSWORD:   ${DB_PASSWORD}
      FRONTEND_URL:  https://${DOMAIN:-app.bcim.in}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - backups_data:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - erp_net
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
    deploy:
      resources:
        limits:
          cpus:   '1.0'
          memory: 512M

  # ─── Frontend React Build ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: https://${DOMAIN:-app.bcim.in}/api/v1
        REACT_APP_SOCKET_URL: https://${DOMAIN:-app.bcim.in}
    container_name: erp_frontend
    restart: unless-stopped
    networks:
      - erp_net
    deploy:
      resources:
        limits:
          cpus:   '0.3'
          memory: 64M

  # ─── Nginx Reverse Proxy + SSL ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/var/www/uploads:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - erp_net
    deploy:
      resources:
        limits:
          cpus:   '0.3'
          memory: 64M

  # ─── Certbot (SSL auto-renew) ────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: erp_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres_data:
  uploads_data:
  logs_data:
  backups_data:
  certbot_www:
  certbot_certs:

networks:
  erp_net:
    driver: bridge
